name: CI
on:
  push:
    branches: [ main ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - run: pip install -r requirements.txt
    - run: pip install flake8 pytest
    - run: flake8 src/ --max-line-length=100 --ignore=E501,W503 || true
    - run: pytest tests/ -v
